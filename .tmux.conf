# Set the default terminal
# --------
set-option -g default-shell /opt/homebrew/bin/fish
set -g default-terminal "$TERM"
# from https://medium.com/@jogarcia/bring-on-the-true-color-on-alacritty-tmux-neovim-99134521731d
set -ga terminal-overrides ",$TERM:Tc"
# from https://ryantravitz.com/blog/2023-02-18-pull-of-the-undercurl/
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0
# --------

# from http://robots.thoughtbot.com/tmux-copy-paste-on-os-x-a-better-future
# --------
# Use vim keybindings in copy mode
set-window-option -g mode-keys vi
set-option -g automatic-rename off
# --------

# from http://superuser.com/questions/570075/tmux-pane-selection-with-mouse
# --------
# Remap splits
unbind %
unbind '"'
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
# --------

# Remap kill window
# --------
unbind &
bind X kill-window
# --------

# Map tree
# --------
unbind t
bind t choose-tree
# --------

# Mouse mode
set -g mouse on

# copy
# originally from https://unix.stackexchange.com/questions/318281/how-to-copy-and-paste-with-a-mouse-with-tmux
# removed the and-cancel - I'd like to control that myself
# --------
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "pbcopy"
# --------

# from http://zanshin.net/2013/09/05/my-tmux-configuration/
# --------
# Bind reload
bind r source-file ~/.tmux.conf
# --------

# from http://www.darkcoding.net/tmux/tmux.conf.txt
# --------
# Titles
set -g set-titles on
set -g set-titles-string '#P'  # pane title
# Status line
# General status
set -g status 2
set -g status-bg '#002b36'
set -g status-fg '#839496'
set -g status-interval 1
# Line 1: windows only (full width), colored by agent-color if set
set -g status-left ''
set -g status-right ''
set -g window-status-format '[#{?#{@agent-color},#[fg=#{@agent-color}],}#I#(~/.tmux-claude-activity.sh #{pane_tty} #{pane_id} 0)#W#{?#{@content-changed},#[fg=yellow]!,}#[default]]'
set -g window-status-current-format '[#{?#{@agent-color},#[fg=#{@agent-color}],#[fg=#eee8d5]}#[bold]#I#(~/.tmux-claude-activity.sh #{pane_tty} #{pane_id} 1)#W#F#[default]]'
# Line 2: session info left, clock right
set -g status-format[1] '#[align=left,fg=#859900,bold]#S:#I.#P #[align=right,fg=#eee8d5,bold]%I:%M %p #[fg=#859900,nobold][%a, %D]'
# --------


# history limit
# https://unix.stackexchange.com/questions/43414/unlimited-history-in-tmux
# --------
set -g history-limit 999999999
# --------

# clearing history
# https://stackoverflow.com/questions/10543684/how-can-i-clear-scrollback-buffer-in-tmux
# --------
bind -n C-l clear-history
# --------
#
# sync panes
# https://stackoverflow.com/questions/16325449/how-to-send-a-command-to-all-panes-in-tmux#comment67920930_23704472
# --------
bind * setw synchronize-panes
# --------

# speed up vim/tmux/terminal
# https://github.com/tmux/tmux/issues/353#issuecomment-294570322
# --------
set-option -s escape-time 10
# --------

# send focus events through, esp for gitgutter
# https://github.com/airblade/vim-gitgutter
# --------
set -g focus-events on
# --------

# interactively choose destination for a pane to be moved to
# https://www.reddit.com/r/commandline/comments/8wv0w6/interactively_moving_panes_to_other_windows/
bind-key C-m choose-tree -Z "join-pane -t '%%'"

# mark content as read when switching windows
set-hook -g after-select-window "run-shell -b '~/.tmux-claude-mark-read.sh'"

# mouse clicks on status bar use switch-client by default, which doesn't
# trigger after-select-window hooks — rebind to select-window so mark-read fires
bind-key -T root MouseDown1Status select-window


# sync status bar colors with macOS light/dark appearance on focus and config reload
set-hook -g client-focus-in "run-shell -b '~/.tmux-theme-sync.sh'"
run-shell -b '~/.tmux-theme-sync.sh'
